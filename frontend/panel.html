<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadScan — Yönetim Paneli</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f1419; --panel: #1a2332; --panel-2: #232f42;
      --txt: #e6edf3; --muted: #8b97a8; --accent: #2dd4bf; --border: #2d3a4f;
      --sari: #facc15; --turuncu: #fb923c; --kirmizi: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--txt); }
    header {
      padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    header h1 { font-size: 18px; margin: 0; }
    header a { color: var(--accent); text-decoration: none; font-size: 14px; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; }
    .wrap { padding: 18px; max-width: 1300px; margin: 0 auto; }
    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    @media (max-width: 800px) { .cards { grid-template-columns: repeat(2, 1fr); } }
    .stat {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
    }
    .stat .num { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat .lbl { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .stat.kritik .num { color: var(--kirmizi); }
    .layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    #map { height: 560px; border-radius: 12px; border: 1px solid var(--border); }
    .listcard { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    select, input[type=date] {
      background: var(--panel-2); color: var(--txt); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; font-size: 13px;
    }
    .list { max-height: 480px; overflow-y: auto; }
    .item {
      display: flex; gap: 10px; align-items: center; padding: 10px;
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; background: var(--panel-2);
    }
    .item .meta { flex: 1; min-width: 0; font-size: 13px; }
    .item .meta .coord { color: var(--muted); font-size: 12px; }
    .badge { padding: 2px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; color: #111; white-space: nowrap; }
    .badge.Küçük { background: var(--sari); }
    .badge.Orta { background: var(--turuncu); }
    .badge.Kritik { background: var(--kirmizi); color: #fff; }
    .item img { width: 56px; height: 42px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background:#000; }
    .item button {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 5px 8px; cursor: pointer; font-size: 12px;
    }
    .item button:hover { border-color: var(--kirmizi); color: var(--kirmizi); }
    .muted { color: var(--muted); font-size: 13px; }
    .lastupd { font-size: 12px; color: var(--muted); }
    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal.open { display: flex; }
    .modal img { max-width: 92vw; max-height: 88vh; border-radius: 10px; }
    .leaflet-popup-content { font-family: system-ui, sans-serif; }
    .leaflet-popup-content img { width: 180px; border-radius: 6px; margin-top: 6px; display:block; }
  </style>
</head>
<body>
  <header>
    <h1>🛣️ RoadScan <span style="color:var(--muted);font-weight:400">Yönetim Paneli</span></h1>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="lastupd" id="lastUpd">—</span>
      <a href="index.html">← Tespit Motoru</a>
    </div>
  </header>

  <div class="wrap">
    <div class="cards">
      <div class="stat"><div class="num" id="cTotal">0</div><div class="lbl">Toplam Tespit</div></div>
      <div class="stat kritik"><div class="num" id="cCritical">0</div><div class="lbl">Kritik Çukur</div></div>
      <div class="stat"><div class="num" id="c24">0</div><div class="lbl">Son 24 Saat</div></div>
      <div class="stat"><div class="num" id="cHot" style="font-size:18px">—</div><div class="lbl">En Yoğun Bölge</div></div>
    </div>

    <div class="layout">
      <div id="map"></div>

      <div class="listcard">
        <div class="filters">
          <select id="fSeverity">
            <option value="">Tüm severity</option>
            <option value="Küçük">Küçük</option>
            <option value="Orta">Orta</option>
            <option value="Kritik">Kritik</option>
          </select>
          <input type="date" id="fDate" />
          <button onclick="clearFilters()" style="background:var(--panel-2);color:var(--txt);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px">Temizle</button>
          <span class="muted" id="listCount" style="margin-left:auto"></span>
        </div>
        <div class="list" id="list"><p class="muted">Yükleniyor…</p></div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" onclick="this.classList.remove('open')">
    <img id="modalImg" src="" alt="tespit görüntüsü" />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = location.origin.startsWith("http") ? location.origin : "http://localhost:3000";

    const SEV_COLOR = { "Küçük": "#facc15", "Orta": "#fb923c", "Kritik": "#ef4444" };

    // Türkiye merkezli harita
    const map = L.map("map").setView([39.0, 35.0], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19, attribution: "© OpenStreetMap",
    }).addTo(map);

    let markerLayer = L.layerGroup().addTo(map);
    let allData = [];

    function imgUrl(p) { return p ? `${API_BASE}${p}` : ""; }

    function severityIcon(sev) {
      const color = SEV_COLOR[sev] || "#888";
      return L.divIcon({
        className: "",
        html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.6)"></div>`,
        iconSize: [18, 18], iconAnchor: [9, 9],
      });
    }

    function fmtDate(ts) {
      const d = new Date(ts);
      return d.toLocaleString("tr-TR", { dateStyle: "short", timeStyle: "short" });
    }

    function applyFilters(data) {
      const sev = document.getElementById("fSeverity").value;
      const date = document.getElementById("fDate").value; // yyyy-mm-dd
      return data.filter((d) => {
        if (sev && d.severity !== sev) return false;
        if (date) {
          const ds = new Date(d.timestamp).toISOString().slice(0, 10);
          if (ds !== date) return false;
        }
        return true;
      });
    }

    function render() {
      const data = applyFilters(allData);
      document.getElementById("listCount").textContent = `${data.length} kayıt`;

      // Harita pinleri
      markerLayer.clearLayers();
      data.forEach((d) => {
        const m = L.marker([d.lat, d.lng], { icon: severityIcon(d.severity) });
        const thumb = d.image_path
          ? `<img src="${imgUrl(d.image_path)}" alt="foto" />` : "";
        m.bindPopup(`
          <b>${d.severity}</b> çukur<br/>
          📅 ${fmtDate(d.timestamp)}<br/>
          📍 ${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}<br/>
          🎯 Güven: ${(d.confidence * 100).toFixed(0)}%
          ${thumb}
        `);
        markerLayer.addLayer(m);
      });

      // Liste
      const list = document.getElementById("list");
      if (data.length === 0) {
        list.innerHTML = `<p class="muted">Kayıt yok.</p>`;
        return;
      }
      list.innerHTML = data.map((d) => `
        <div class="item">
          ${d.image_path
            ? `<img src="${imgUrl(d.image_path)}" onclick="openImg('${imgUrl(d.image_path)}')" alt="foto"/>`
            : `<div style="width:56px;height:42px;border-radius:6px;background:#000;border:1px solid var(--border)"></div>`}
          <div class="meta">
            <div>${fmtDate(d.timestamp)} <span class="badge ${d.severity}">${d.severity}</span></div>
            <div class="coord">${d.lat.toFixed(5)}, ${d.lng.toFixed(5)} • güven ${(d.confidence * 100).toFixed(0)}%</div>
          </div>
          <button onclick="focusOn(${d.lat}, ${d.lng})">Haritada</button>
          <button onclick="delDetection(${d.id})">Sil</button>
        </div>
      `).join("");
    }

    function focusOn(lat, lng) {
      map.setView([lat, lng], 16);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function openImg(url) {
      document.getElementById("modalImg").src = url;
      document.getElementById("modal").classList.add("open");
    }
    function clearFilters() {
      document.getElementById("fSeverity").value = "";
      document.getElementById("fDate").value = "";
      render();
    }
    document.getElementById("fSeverity").onchange = render;
    document.getElementById("fDate").onchange = render;

    async function delDetection(id) {
      if (!confirm(`#${id} numaralı kayıt silinsin mi?`)) return;
      try {
        const r = await fetch(`${API_BASE}/api/detections/${id}`, { method: "DELETE" });
        const j = await r.json();
        if (j.success) { allData = allData.filter((d) => d.id !== id); render(); loadStats(); }
        else alert("Silinemedi: " + (j.error || "?"));
      } catch { alert("Sunucuya ulaşılamadı."); }
    }

    async function loadData() {
      try {
        const r = await fetch(`${API_BASE}/api/detections`);
        allData = await r.json();
        render();
        document.getElementById("lastUpd").textContent =
          "Son güncelleme: " + new Date().toLocaleTimeString("tr-TR");
      } catch {
        document.getElementById("list").innerHTML =
          `<p class="muted">✖ Sunucuya ulaşılamadı. Backend çalışıyor mu? (${API_BASE})</p>`;
      }
    }

    async function loadStats() {
      try {
        const r = await fetch(`${API_BASE}/api/detections/stats`);
        const s = await r.json();
        document.getElementById("cTotal").textContent = s.total;
        document.getElementById("cCritical").textContent = s.critical;
        document.getElementById("c24").textContent = s.last24h;
        document.getElementById("cHot").textContent = s.hotspot
          ? `${s.hotspot.lat.toFixed(3)}, ${s.hotspot.lng.toFixed(3)} (${s.hotspot.count})`
          : "—";
      } catch { /* sessiz geç */ }
    }

    function refresh() { loadData(); loadStats(); }
    refresh();
    setInterval(refresh, 30000); // her 30 saniyede otomatik yenile
  </script>
</body>
</html>
