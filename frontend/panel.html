<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoadScan — Yönetim Paneli</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg:#0b0f17; --panel:#141d2e; --panel2:#1c2840; --txt:#e8eef6; --muted:#8d9bb3;
      --accent:#2dd4bf; --border:#243150; --sari:#facc15; --turuncu:#fb923c; --kirmizi:#ef4444;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      background:radial-gradient(1200px 600px at 70% -10%, #16233b 0%, var(--bg) 55%); color:var(--txt); min-height:100vh; }
    header { padding:14px 22px; background:rgba(15,22,38,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; position:sticky; top:0; z-index:50; }
    .brand { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; }
    .brand .dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); }
    .brand small { color:var(--muted); font-weight:400; font-size:13px; }
    header a.link { color:var(--accent); text-decoration:none; font-size:14px; border:1px solid var(--border); padding:7px 14px; border-radius:10px; }
    header a.link:hover { background:rgba(45,212,191,.08); }
    .lastupd { font-size:12px; color:var(--muted); }
    .wrap { padding:20px; max-width:1320px; margin:0 auto; }
    .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:14px; }
    @media (max-width:800px){ .cards { grid-template-columns:repeat(2,1fr); } }
    .stat { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .stat .num { font-size:28px; font-weight:700; font-variant-numeric:tabular-nums; }
    .stat .lbl { font-size:13px; color:var(--muted); margin-top:4px; }
    .stat.kritik .num { color:var(--kirmizi); }
    .typebar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .typechip { background:var(--panel); border:1px solid var(--border); border-radius:999px; padding:8px 14px; font-size:13px; }
    .typechip b { font-variant-numeric:tabular-nums; margin-left:4px; }
    .layout { display:grid; grid-template-columns:1.4fr 1fr; gap:16px; align-items:start; }
    @media (max-width:980px){ .layout { grid-template-columns:1fr; } }
    #map { height:600px; border-radius:14px; border:1px solid var(--border); }
    .listcard { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .filters { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
    select, input[type=date] { background:var(--panel2); color:var(--txt); border:1px solid var(--border); border-radius:9px; padding:8px 10px; font-size:13px; }
    .btn-clear { background:var(--panel2); color:var(--txt); border:1px solid var(--border); border-radius:9px; padding:8px 12px; cursor:pointer; font-size:13px; }
    .list { max-height:600px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .item { display:flex; gap:12px; align-items:center; padding:10px; border:1px solid var(--border); border-radius:12px; background:var(--panel2); }
    .item img { width:86px; height:64px; object-fit:cover; border-radius:9px; border:2px solid var(--border); cursor:pointer; background:#000; flex:0 0 auto; }
    .item.Küçük img { border-color:var(--sari); } .item.Orta img { border-color:var(--turuncu); } .item.Kritik img { border-color:var(--kirmizi); }
    .item .meta { flex:1; min-width:0; font-size:14px; }
    .item .meta .type { font-weight:600; display:flex; align-items:center; gap:6px; }
    .item .meta .coord { color:var(--muted); font-size:12px; margin-top:3px; }
    .badge { padding:2px 9px; border-radius:999px; font-size:11px; font-weight:600; color:#111; white-space:nowrap; }
    .badge.Küçük { background:var(--sari); } .badge.Orta { background:var(--turuncu); } .badge.Kritik { background:var(--kirmizi); color:#fff; }
    .item .acts { display:flex; flex-direction:column; gap:6px; }
    .item .acts button { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 9px; cursor:pointer; font-size:12px; white-space:nowrap; }
    .item .acts button:hover { border-color:var(--accent); color:var(--accent); }
    .item .acts button.del:hover { border-color:var(--kirmizi); color:var(--kirmizi); }
    .muted { color:var(--muted); font-size:13px; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal.open { display:flex; } .modal img { max-width:92vw; max-height:88vh; border-radius:12px; }
    .leaflet-popup-content { font-family:system-ui,sans-serif; }
    .leaflet-popup-content img { width:200px; border-radius:8px; margin-top:6px; display:block; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span> RoadScan <small>Yönetim Paneli</small></div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="lastupd" id="lastUpd">—</span>
      <a class="link" href="index.html">← Tespit Motoru</a>
    </div>
  </header>

  <div class="wrap">
    <div class="cards">
      <div class="stat"><div class="num" id="cTotal">0</div><div class="lbl">Toplam Bozukluk</div></div>
      <div class="stat kritik"><div class="num" id="cCritical">0</div><div class="lbl">Kritik Seviye</div></div>
      <div class="stat"><div class="num" id="c24">0</div><div class="lbl">Son 24 Saat</div></div>
      <div class="stat"><div class="num" id="cHot" style="font-size:17px">—</div><div class="lbl">En Yoğun Bölge</div></div>
    </div>

    <div class="typebar" id="typeBar"></div>

    <div class="layout">
      <div id="map"></div>
      <div class="listcard">
        <div class="filters">
          <select id="fType"><option value="">Tüm türler</option></select>
          <select id="fSeverity">
            <option value="">Tüm seviyeler</option>
            <option value="Kritik">🔴 Kritik (engel)</option>
            <option value="Orta">🟠 Orta (sorun olabilir)</option>
          </select>
          <input type="date" id="fDate" />
          <button class="btn-clear" onclick="clearFilters()">Temizle</button>
          <span class="muted" id="listCount" style="margin-left:auto"></span>
        </div>
        <div class="list" id="list"><p class="muted">Yükleniyor…</p></div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" onclick="this.classList.remove('open')"><img id="modalImg" src="" alt="tespit" /></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = location.origin.startsWith("http") ? location.origin : "http://localhost:3000";
    const SEV_COLOR = { "Küçük": "#facc15", "Orta": "#fb923c", "Kritik": "#ef4444" };
    const ICON = { "Çukur":"🕳️", "Boyuna Çatlak":"↕️", "Enine Çatlak":"↔️", "Timsah Çatlak":"🐊" };
    const tIcon = (l) => ICON[l] || "⚠️";

    const map = L.map("map").setView([39.0, 35.0], 6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(map);
    let markerLayer = L.layerGroup().addTo(map);
    let allData = [];

    const imgUrl = (p) => (p ? `${API_BASE}${p}` : "");
    function severityIcon(sev) {
      const color = SEV_COLOR[sev] || "#888";
      return L.divIcon({ className: "", html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.6)"></div>`, iconSize: [18, 18], iconAnchor: [9, 9] });
    }
    const fmtDate = (ts) => new Date(ts).toLocaleString("tr-TR", { dateStyle: "short", timeStyle: "short" });

    function applyFilters(data) {
      const sev = document.getElementById("fSeverity").value;
      const type = document.getElementById("fType").value;
      const date = document.getElementById("fDate").value;
      return data.filter((d) => {
        if (sev && d.severity !== sev) return false;
        if (type && (d.label || "") !== type) return false;
        if (date && new Date(d.timestamp).toISOString().slice(0, 10) !== date) return false;
        return true;
      });
    }

    function populateTypeFilter() {
      const sel = document.getElementById("fType");
      const cur = sel.value;
      const types = [...new Set(allData.map((d) => d.label).filter(Boolean))];
      sel.innerHTML = `<option value="">Tüm türler</option>` + types.map((t) => `<option value="${t}">${tIcon(t)} ${t}</option>`).join("");
      sel.value = cur;
    }

    function render() {
      const data = applyFilters(allData);
      document.getElementById("listCount").textContent = `${data.length} kayıt`;

      markerLayer.clearLayers();
      data.forEach((d) => {
        const m = L.marker([d.lat, d.lng], { icon: severityIcon(d.severity) });
        const thumb = d.image_path ? `<img src="${imgUrl(d.image_path)}" alt="foto" />` : "";
        m.bindPopup(`<b>${tIcon(d.label)} ${d.label || "Bozukluk"}</b> — ${d.severity}<br/>
          📅 ${fmtDate(d.timestamp)}<br/>📍 ${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}<br/>
          🎯 Güven: ${(d.confidence * 100).toFixed(0)}%${thumb}`);
        markerLayer.addLayer(m);
      });

      const list = document.getElementById("list");
      if (data.length === 0) { list.innerHTML = `<p class="muted">Kayıt yok.</p>`; return; }
      list.innerHTML = data.map((d) => `
        <div class="item ${d.severity}">
          ${d.image_path
            ? `<img src="${imgUrl(d.image_path)}" onclick="openImg('${imgUrl(d.image_path)}')" alt="bozukluk"/>`
            : `<div style="width:86px;height:64px;border-radius:9px;background:#000;border:1px solid var(--border);flex:0 0 auto"></div>`}
          <div class="meta">
            <div class="type">${tIcon(d.label)} ${d.label || "Bozukluk"} <span class="badge ${d.severity}">${d.severity}</span></div>
            <div class="coord">📅 ${fmtDate(d.timestamp)}</div>
            <div class="coord">📍 ${d.lat.toFixed(5)}, ${d.lng.toFixed(5)} • güven ${(d.confidence * 100).toFixed(0)}%</div>
          </div>
          <div class="acts">
            <button onclick="focusOn(${d.lat}, ${d.lng})">Haritada</button>
            <button class="del" onclick="delDetection(${d.id})">Sil</button>
          </div>
        </div>`).join("");
    }

    function focusOn(lat, lng) { map.setView([lat, lng], 16); window.scrollTo({ top: 0, behavior: "smooth" }); }
    function openImg(url) { document.getElementById("modalImg").src = url; document.getElementById("modal").classList.add("open"); }
    function clearFilters() {
      document.getElementById("fSeverity").value = ""; document.getElementById("fType").value = "";
      document.getElementById("fDate").value = ""; render();
    }
    document.getElementById("fSeverity").onchange = render;
    document.getElementById("fType").onchange = render;
    document.getElementById("fDate").onchange = render;

    async function delDetection(id) {
      if (!confirm(`#${id} numaralı kayıt silinsin mi?`)) return;
      try {
        const j = await (await fetch(`${API_BASE}/api/detections/${id}`, { method: "DELETE" })).json();
        if (j.success) { allData = allData.filter((d) => d.id !== id); populateTypeFilter(); render(); loadStats(); }
        else alert("Silinemedi: " + (j.error || "?"));
      } catch { alert("Sunucuya ulaşılamadı."); }
    }

    async function loadData() {
      try {
        allData = await (await fetch(`${API_BASE}/api/detections`)).json();
        populateTypeFilter(); render();
        document.getElementById("lastUpd").textContent = "Son güncelleme: " + new Date().toLocaleTimeString("tr-TR");
      } catch {
        document.getElementById("list").innerHTML = `<p class="muted">✖ Sunucuya ulaşılamadı. Backend çalışıyor mu? (${API_BASE})</p>`;
      }
    }

    async function loadStats() {
      try {
        const s = await (await fetch(`${API_BASE}/api/detections/stats`)).json();
        document.getElementById("cTotal").textContent = s.total;
        document.getElementById("cCritical").textContent = s.critical;
        document.getElementById("c24").textContent = s.last24h;
        document.getElementById("cHot").textContent = s.hotspot
          ? `${s.hotspot.lat.toFixed(3)}, ${s.hotspot.lng.toFixed(3)} (${s.hotspot.count})` : "—";
        const bar = document.getElementById("typeBar");
        bar.innerHTML = (s.byLabel || []).filter((x) => x.label && x.label !== "Bilinmiyor")
          .map((x) => `<div class="typechip">${tIcon(x.label)} ${x.label}<b>${x.c}</b></div>`).join("")
          || `<div class="typechip muted">Henüz bozukluk türü kaydı yok</div>`;
      } catch {}
    }

    function refresh() { loadData(); loadStats(); }
    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
