<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>RoadScan — ONNX Teşhis</title>
  <style>
    body { font-family: ui-monospace, Consolas, monospace; background:#0a0e13; color:#cfe; padding:20px; }
    h1 { color:#2dd4bf; font-size:18px; }
    pre { background:#111b26; border:1px solid #2d3a4f; border-radius:8px; padding:14px; white-space:pre-wrap; word-break:break-word; font-size:13px; line-height:1.5; }
    .ok { color:#4ade80; } .err { color:#f87171; } .warn { color:#facc15; }
  </style>
</head>
<body>
  <h1>🔬 RoadScan ONNX Teşhis</h1>
  <pre id="out">Başlıyor…
</pre>
  <script src="vendor/ort/ort.webgpu.min.js"></script>
  <script>
    const out = document.getElementById("out");
    const log = (msg, cls) => { out.innerHTML += (cls ? `<span class="${cls}">${msg}</span>` : msg) + "\n"; };

    (async () => {
      try {
        log("ort tanımlı mı? " + (typeof ort !== "undefined"), typeof ort !== "undefined" ? "ok" : "err");
        if (typeof ort === "undefined") { log("ort YOK — script yüklenmedi.", "err"); return; }
        log("ort sürüm: " + (ort.env && ort.env.versions ? JSON.stringify(ort.env.versions) : "?"));
        log("navigator.gpu (WebGPU) var mı? " + (!!navigator.gpu), navigator.gpu ? "ok" : "warn");
        log("crossOriginIsolated (SharedArrayBuffer): " + self.crossOriginIsolated);

        ort.env.wasm.wasmPaths = new URL("vendor/ort/", location.href).href;
        log("wasmPaths = " + ort.env.wasm.wasmPaths);
        ort.env.wasm.numThreads = 1;
        ort.env.wasm.proxy = false;

        log("\n1) Model dosyası indiriliyor (models/pothole.onnx)…");
        const r = await fetch("models/pothole.onnx");
        log("   HTTP " + r.status + " " + (r.headers.get("content-type") || ""), r.ok ? "ok" : "err");
        if (!r.ok) { log("   Model indirilemedi, durduruldu.", "err"); return; }
        const buf = new Uint8Array(await r.arrayBuffer());
        log("   indirilen boyut: " + (buf.length / 1e6).toFixed(2) + " MB", "ok");

        log("\n2) WebGPU ile deneniyor…");
        try {
          const s = await ort.InferenceSession.create(buf, { executionProviders: ["webgpu"] });
          log("   ✔ WebGPU BAŞARILI! giriş=" + s.inputNames + " çıkış=" + s.outputNames, "ok");
          log("\n>>> SONUÇ: Model WebGPU ile yükleniyor. Ana sayfa çalışmalı.", "ok");
          return;
        } catch (e) {
          log("   ✖ WebGPU hata: " + (e && e.message ? e.message : e), "err");
        }

        log("\n3) WASM ile deneniyor…");
        try {
          const s = await ort.InferenceSession.create(buf, { executionProviders: ["wasm"] });
          log("   ✔ WASM BAŞARILI! giriş=" + s.inputNames + " çıkış=" + s.outputNames, "ok");
          log("\n>>> SONUÇ: Model WASM ile yükleniyor. Ana sayfa çalışmalı.", "ok");
          return;
        } catch (e) {
          log("   ✖ WASM hata: " + (e && e.message ? e.message : e), "err");
          log("   stack: " + (e && e.stack ? e.stack : "-"), "err");
        }

        log("\n>>> SONUÇ: Her iki backend de başarısız. Yukarıdaki hata satırlarını paylaş.", "err");
      } catch (e) {
        log("GENEL HATA: " + (e && e.message ? e.message : e), "err");
        log("stack: " + (e && e.stack ? e.stack : "-"), "err");
      }
    })();
  </script>
</body>
</html>
